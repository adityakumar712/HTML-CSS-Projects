<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    
</head>
<body>
   <div class="container">
    <div class="upper">
        <div class="image">
            <img src="./mypic.jpg" alt="profile-pic">
        </div>

    </div>
    <div class="bottom">
        <h2>ADITYA KUMAR</h2>
        <p>STUDENT & WEB DEVELOPER</p>

        <div class="social-handle">
            <a href="#" target="_blank"><i class="fa-brands fa-square-linkedin" style="color:#0A66C2"></i></a>
            <a href="#" target="_blank"><i class="fa-brands fa-square-github" style="color:#181717;"></i></a>
            <a href="#" target="_blank"><i class="fa-brands fa-square-facebook" style="color:#1877F2"></i></a>
            <a href="#" target="_blank"><i class="fa-brands fa-square-instagram" style="color:#E4405F;"></i></a>
        </div>

        <div class="button">
            <button>Contact Me</button>
            <button>Message me</button>
        </div>

        <div class="statitics">
            <div class="stats">
                <i class="fa-solid fa-heart" style="color:#FF3040;"></i>
                <span>60k</span>
            </div>

            <div class="stats">
                <i class="fa-solid fa-comment" style="color:#1877F2;"></i>
                <span>1.2k</span>
            </div>

            <div class="stats">
                <i class="fa-solid fa-share" style="color:#000"></i>
                <span>20k</span>
            </div>

        </div>
    </div>
   </div> 
</body>
</html>
